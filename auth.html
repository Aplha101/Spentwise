<!DOCTYPE html>
<html>
<head>
  <title>Login / Signup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-2xl shadow-lg flex w-[750px] overflow-hidden">

    <div class="hidden md:flex flex-col justify-center items-center bg-blue-500 text-white w-1/2 p-8">
      <h1 class="text-3xl font-bold mb-4">Finance Tracker</h1>
      <p class="text-center text-blue-100">
        Track your income, control your expenses, and build better financial habits.
      </p>
    </div>

    <div class="w-full md:w-1/2 p-8">

      <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">
        Welcome Back
      </h2>

      <input id="email" type="email" placeholder="Email"
        class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300"/>

      <input id="password" type="password" placeholder="Password"
        class="w-full mb-6 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300"/>

      <button onclick="login()" 
        class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-lg mb-3 transition">
        Login
      </button>

      <button onclick="signup()" 
        class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-lg transition">
        Create Account
      </button>

      <p id="msg" class="text-center mt-4 text-red-500"></p>

    </div>

  </div>

<script>
const API = "https://sheetdb.io/api/v1/0u6jl12jdnhs2";

function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  let logged = false;
  axios.post(API, {
    data: [{ email, password }]
  })
  .then(() => {
    localStorage.setItem("user", email);
    window.location.href = "dashboard.html";
  })
  .catch(() => {
    document.getElementById("msg").innerText = "Error signing up";
  });
}

function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  axios.get(API, {
    params: { email, password }
  })
  .then(res => {
    if(res.data.length > 0){
      logged = true
      localStorage.setItem("user", email);
      localStorage.setItem("logged", logged);
      window.location.href = "dashboard.html";
    } else {
      document.getElementById("msg").innerText = "Invalid credentials";
    }
  });
}
</script>

</body>
</html>
